syntax = "proto3";

package auth;

enum Gender {
  FEMALE = 0;
  MALE = 1;
}

message Phone {
  uint32 country_code = 1;
  string number = 2;
}

message User {
  string user_id = 1;

  oneof user_type {
    Anonymous anonymous = 2;
    Registered registered = 3;
  }

  message Anonymous {}

  message Registered {
    bool verified = 1;

    oneof registered_type {
      Viewer viewer = 2;
      Organizer organizer = 3;
    }

    message Viewer {
      string birth_date = 1;
      Phone phone = 2;
      Gender gender = 3;
    }

    message Organizer {
      repeated string roles = 1;
      string email = 2;
    }
  }
}

message AuthTokenPayload {
  double issued_at = 1;
  User user = 2;
}

message AuthTokenSignature {
  bytes hmac256 = 1;
}

message AuthToken {
  AuthTokenPayload payload = 1;
  AuthTokenSignature signature = 2;
}